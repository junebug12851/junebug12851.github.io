- key: random-ai-prompt
  release: "Run from source (no prebuilt binaries)"
  releases_url: https://github.com/junebug12851/random-ai-prompt
  readme_url: https://github.com/junebug12851/random-ai-prompt#readme
  docs_url: null
  note: >-
    This one is a JavaScript tool with a web UI — there are no packaged binaries
    to download; you run it from source with Node. A stripped, generate-only build
    is also hosted online at <a href="https://prompt.fairyfox.io">prompt.fairyfox.io</a>.
  tabs:
    - label: "Run it (Node)"
      badge: Recommended
      download: https://github.com/junebug12851/random-ai-prompt/archive/refs/heads/main.zip
      filename: random-ai-prompt — source (.zip)
      intro: "Download the source, or clone it, then start the web app with Node. As of 2.7.0 the active project lives under <code>engine-v3/</code>."
      steps:
        - "Install <strong>Node.js</strong> (any recent version)."
        - "Get the code (download the .zip above, or clone), then build and run the web app from <code>engine-v3/</code>:"
      code: |
        git clone https://github.com/junebug12851/random-ai-prompt.git
        cd random-ai-prompt/engine-v3
        npm install
        npm run web

    - label: "Source"
      intro: "Browse the full source, the web app, and the docs in the repository."
      steps:
        - "The README has the complete install, update, and usage guide."
        - "The active engine + React/Vite web app live under <code>engine-v3/</code>; the original CLI and classic web UI are preserved, frozen, under <code>engine-v1-2/</code>."
      code: |
        git clone https://github.com/junebug12851/random-ai-prompt.git
