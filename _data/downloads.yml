# ── Downloads registry ───────────────────────────────────────────────────────
# Drives the /downloads/ page. Keyed by `key`, which matches _data/projects.yml
# (the project identity — name, repo, status — lives there; this file only adds
# the download specifics). Keep the keys in step with projects.yml.
#
# Per project:
#   key            slug — must match a project in projects.yml
#   release        human label for the build these links point at (e.g. the tag)
#   releases_url   the project's "latest release" page (the always-current fallback)
#   readme_url     external link to the README / install instructions
#   docs_url       external link to the full docs site (null if none)
#   note           one-line caveat shown above the tabs (null to omit)
#   tabs []        one tab per build artifact, plus a Source tab last. Each tab:
#       label        tab caption (e.g. "Windows · Installer")
#       badge        optional pill on the tab/panel (e.g. "Recommended")
#       download     direct file URL pinned to the release (null for the Source tab)
#       filename     the file name shown on the button (null if no download)
#       intro        one-line description of this artifact (null to omit)
#       steps []     condensed do-this list: build (if needed) → install → run
#       code         optional shell block rendered verbatim (null to omit)
#
# Direct file links are version-pinned, so they must be refreshed when a project
# cuts a new release; the `releases_url` link never goes stale and is always shown
# alongside as the fallback. random-ai-prompt has no published releases, so it is
# source/run-only (no direct binaries).

# ───────────────────────────────────────────────────────────────────────────
- key: pokered-save-editor-2
  release: "v0.14.2-alpha (pre-release)"
  releases_url: https://github.com/junebug12851/pokered-save-editor-2/releases/latest
  readme_url: https://github.com/junebug12851/pokered-save-editor-2#readme
  docs_url: https://fairyfox.io/pokered-save-editor-2/
  note: >-
    Alpha builds are unsigned, so Windows SmartScreen (and some Linux setups) may
    warn on first launch — that's expected, not a problem with the file.
  tabs:
    - label: "Windows · Installer"
      badge: Recommended
      download: https://github.com/junebug12851/pokered-save-editor-2/releases/download/v0.14.2-alpha/PokeredSaveEditor-0.14.2-alpha-windows-x64-setup.exe
      filename: PokeredSaveEditor-0.14.2-alpha-windows-x64-setup.exe
      intro: The simplest way to get going on Windows — a standard installer.
      steps:
        - "Download and run the installer."
        - "If SmartScreen warns, choose <em>More info → Run anyway</em> (the build is unsigned)."
        - "Launch <strong>Pokered Save Editor</strong> from the Start menu."

    - label: "Windows · Portable"
      download: https://github.com/junebug12851/pokered-save-editor-2/releases/download/v0.14.2-alpha/PokeredSaveEditor-0.14.2-alpha-windows-x64-portable.zip
      filename: PokeredSaveEditor-0.14.2-alpha-windows-x64-portable.zip
      intro: No-install build — unzip and run in place.
      steps:
        - "Download the .zip and extract it anywhere."
        - "Run <code>PokeredSaveEditor.exe</code> from the extracted folder."

    - label: "Linux · AppImage"
      download: https://github.com/junebug12851/pokered-save-editor-2/releases/download/v0.14.2-alpha/PokeredSaveEditor-0.14.2-alpha-x86_64.AppImage
      filename: PokeredSaveEditor-0.14.2-alpha-x86_64.AppImage
      intro: Portable single-file build — no install, runs on most distros.
      steps:
        - "Download the .AppImage, then make it executable and run it:"
      code: |
        chmod +x PokeredSaveEditor-0.14.2-alpha-x86_64.AppImage
        ./PokeredSaveEditor-0.14.2-alpha-x86_64.AppImage

    - label: "Linux · Portable"
      download: https://github.com/junebug12851/pokered-save-editor-2/releases/download/v0.14.2-alpha/PokeredSaveEditor-0.14.2-alpha-linux-x64-portable.tar.gz
      filename: PokeredSaveEditor-0.14.2-alpha-linux-x64-portable.tar.gz
      intro: The full bundled tree (Qt libraries included), if you prefer a tarball.
      steps:
        - "Download and extract the archive:"
      code: |
        tar -xzf PokeredSaveEditor-0.14.2-alpha-linux-x64-portable.tar.gz
        ./usr/bin/PokeredSaveEditor

    - label: "Source & build"
      intro: "Build it yourself with Qt 6 and CMake (Qt 6.8.3, Release config)."
      steps:
        - "Install <strong>Qt 6.8.3</strong> and <strong>CMake</strong>."
        - "Clone, configure, and build the app target:"
        - "The full build guide is in the project's README."
      code: |
        git clone https://github.com/junebug12851/pokered-save-editor-2.git
        cd pokered-save-editor-2
        cmake -S projects -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build -j --target PokeredSaveEditor

# ───────────────────────────────────────────────────────────────────────────
- key: pokered-save-editor
  release: "v2.0.1 (final — no further updates)"
  releases_url: https://github.com/junebug12851/pokered-save-editor/releases/latest
  readme_url: https://github.com/junebug12851/pokered-save-editor#readme
  docs_url: null
  note: >-
    The predecessor editor (Electron). It is feature-complete and stable, but
    receives no further updates — these are its final release builds.
  tabs:
    - label: "Windows"
      badge: Recommended
      download: https://github.com/junebug12851/pokered-save-editor/releases/download/v2.0.1/Pokered.Save.Editor.Portable.win.exe
      filename: Pokered.Save.Editor.Portable.win.exe
      intro: Portable Windows build — no install needed.
      steps:
        - "Download the .exe and run it (approve any SmartScreen warning — it's unsigned)."
        - "A .zip alternative is also attached to the release if you prefer to extract it yourself."

    - label: "macOS"
      download: https://github.com/junebug12851/pokered-save-editor/releases/download/v2.0.1/Pokered.Save.Editor.mac.dmg
      filename: Pokered.Save.Editor.mac.dmg
      intro: macOS disk image.
      steps:
        - "Download and open the .dmg."
        - "Drag <strong>Pokered Save Editor</strong> into Applications, then launch it."
        - "If Gatekeeper blocks it, right-click the app → <em>Open</em> (it's unsigned)."

    - label: "Linux"
      download: https://github.com/junebug12851/pokered-save-editor/releases/download/v2.0.1/Pokered.Save.Editor.Setup.linux.i386.AppImage
      filename: Pokered.Save.Editor.Setup.linux.i386.AppImage
      intro: Portable AppImage — a portable .tar.xz is also attached to the release.
      steps:
        - "Download the .AppImage, then make it executable and run it:"
      code: |
        chmod +x Pokered.Save.Editor.Setup.linux.i386.AppImage
        ./Pokered.Save.Editor.Setup.linux.i386.AppImage

    - label: "Source & build"
      intro: "An Electron + Angular + TypeScript app — run it from source with Node."
      steps:
        - "Install <strong>Node.js</strong>, then clone and start it:"
      code: |
        git clone https://github.com/junebug12851/pokered-save-editor.git
        cd pokered-save-editor
        npm install
        npm start

