# ── Project registry ─────────────────────────────────────────────────────────
# The single list of projects, rendered on the home page, the /projects/ page,
# and the header "Projects" dropdown. Companion to hub/registry.yml (the machine
# registry used for cross-project git sync). Keep them in step.
#
# Fields:
#   name       display name
#   key        slug = repo name = path under the domain (fairyfox.io/<key>/)
#   repo       GitHub repository URL
#   docs       project's OWN docs site (external GitHub Pages). null if none.
#   doc_url    override for the on-site "Documentation" link (else /docs/<key>/)
#   notes      browsable notes location (repo notes folder). null if none.
#   blurb      one-line description
#   tags []    category tags (Title-cased; tech / kind)
#   lifecycle  alpha | beta | released   (one; standard colors red/yellow/green)
#   version    e.g. "0.14.2"  (rendered as v0.14.2)
#   activity   active | inactive   (separate axis from lifecycle)
#   updated    last-updated date string (manual for now; later from the pulse)
#   color      per-project accent (hex) — card accent + glyph
#   icon       icon slug under /assets/icons/<icon>.png
#   featured   show on the home page
#   reference  pulled into assets/references for cross-project sync
#
# fairyfox.io itself is listed as a (meta) project, treated like the others.

- name: Pokered Save Editor 2
  key: pokered-save-editor-2
  repo: https://github.com/junebug12851/pokered-save-editor-2
  docs: https://fairyfox.io/pokered-save-editor-2/
  notes: https://github.com/junebug12851/pokered-save-editor-2/tree/main/notes
  blurb: >-
    A desktop save-file editor for Pokémon Red & Blue, built in Qt 6 (C++/QML):
    byte-exact save read/write, full team/box/item/randomiser editing, and an
    in-game font keyboard.
  tags: [Qt 6, C++, QML, Desktop]
  lifecycle: alpha
  version: "0.14.2"
  activity: active
  updated: "Jun 26, 2026"
  updated_iso: "2026-06-26"
  color: "#e6488f"
  icon: pse2
  featured: true
  reference: true

