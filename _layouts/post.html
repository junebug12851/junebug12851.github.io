---
layout: default
---
<article class="article">
  <div class="wrap">
    <p class="post-meta">
      <a href="{{ '/blog/' | relative_url }}">Updates</a> ·
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {%- if page.tags and page.tags.size > 0 %} ·
        {% for t in page.tags %}<span class="tag muted">{{ t }}</span>{% endfor %}
      {%- endif %}
    </p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lead">{{ page.subtitle }}</p>{% endif %}
    <div class="content">
      {{ content }}
    </div>
    <hr>
    <p class="muted"><a href="{{ '/blog/' | relative_url }}">← All updates</a></p>
  </div>
</article>
