# ── Round-up "last seen" markers ─────────────────────────────────────────────
# Records the dev-branch commit each project was at when the most recent round-up
# pass ran, so the next pass knows where to resume. Updated by the cross-project
# round-up pass (see notes/reference/blogging-workflow.md). Git-only awareness;
# nothing here is a dependency.
#
# reports_through: the LIST of process-report filenames (notes/fairyfox-reports/)
# this hub has already digested for that project, so the report-review pass knows
# where to resume — it reads any report file NOT on the list. A filename list, not a
# bare date or a commit SHA: two reports can share a date (and a same-day follow-on
# can even sort lexically before its sibling), and a bare date or SHA is a fragile
# resume key, so the filename is the stable one. Updated (appended) by the review
# pass — see hub/standards/process-reports.md. [] = none digested yet.

