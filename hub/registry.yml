# ── Project registry (machine-readable) ──────────────────────────────────────
# The list the hub uses for cross-project sync + blog round-ups. The human-facing
# companion (rendered on the site) is ../_data/projects.yml — keep them in step.
#
# Per entry:
#   key      short slug = the folder name under assets/references/
#   repo     github URL
#   branch   the branch the hub TRACKS FOR SYNC = the project's work branch
#            (default: dev). This is NOT the repo's default/stable branch:
#            projects track `dev` (latest work); the stable branch is `main`
#            (MANDATORY — a repo still on `master` is renamed to `main` on
#            adoption; see hub/standards/git-workflow.md). Two onboarding sessions
#            misread this field as "default branch" — it isn't.
#   adopts_hub    true ONLY once the project has actually adopted the standards
#                 (mesh-aware CLAUDE.md, notes, themed docs) — see honesty rule below.
#   notes_system  true ONLY once the shared living-notes system is actually in place.
#
# Honesty rule (don't seed a false "done"): set adopts_hub / notes_system to reflect
# what is REALLY true today, and don't pre-register a project with optimistic flags
# before the project-side work exists. A registry row is "listed", which is NOT the
# same as "integrated" — see hub/standards/onboarding-existing-project.md
# ("Registered != integrated"). When project-side onboarding is genuinely complete,
# update the flags; until then, mark the real (partial) state.
#
# last_seen is updated by the round-up pass (see notes/reference/blogging-workflow.md)
# to remember where the previous diff stopped.

hub:
  repo: https://github.com/1fairyfox/1fairyfox.github.io
  branch: dev
  role: hub            # this very repo — the source of shared standards

projects:
  - key: pokered-save-editor-2
    repo: https://github.com/1fairyfox/pokered-save-editor-2
    branch: dev
    adopts_hub: true
    notes_system: true
    last_seen: null

  # Predecessor to pokered-save-editor-2. Outside the sync mesh — it follows none
  # of the shared standards and is not pulled into assets/references (reference:
  # false in ../_data/projects.yml). Listed here only to keep the two registries
  # in step. Default branch is `master`.
  - key: pokered-save-editor
    repo: https://github.com/1fairyfox/pokered-save-editor
    branch: master
    adopts_hub: false
    notes_system: false
    last_seen: null

  - key: random-ai-prompt
    repo: https://github.com/1fairyfox/random-ai-prompt
    branch: dev
    adopts_hub: true
    notes_system: true
    last_seen: null

  # First PaperMC plugin (Kotlin/Gradle, Paper 1.21.11 / Java 21) — a modern rewrite
  # of a 2021 Java/Maven plugin, resurfaced and fully onboarded: mesh-aware
  # CLAUDE.md, the shared notes system, and a fairyfox-themed docs site are all in
  # place, so adopts_hub is true. Category `papermc` in ../_data/projects.yml; more
  # PaperMC plugins are expected under the same category.
  - key: papermc-despawned-items
    repo: https://github.com/1fairyfox/papermc-despawned-items
    branch: dev
    adopts_hub: true
    notes_system: true
    last_seen: null

  # Integrated with the site (a /games/ player page will embed it — still to be built
  # on the hub). Onboarded: mesh-aware CLAUDE.md, notes system, and themed docs site
  # are all in place, so adopts_hub is true.
  - key: fairyfox-games
    repo: https://github.com/1fairyfox/fairyfox-games
    branch: dev
    adopts_hub: true
    notes_system: true
    last_seen: null

  # Integrated with the site (its own top-level "Stories" nav slot → /stories/ →
  # /fairyfox-stories/). A Jekyll "story farm" node — mesh-aware CLAUDE.md, notes
  # system, and the shared fairyfox chrome are all in place, so adopts_hub is true.
  - key: fairyfox-stories
    repo: https://github.com/1fairyfox/fairyfox-stories
    branch: dev
    adopts_hub: true
    notes_system: true
    last_seen: null
