name: pages

# Builds the Jekyll site and deploys it to GitHub Pages on every push to `main`.
# Because we build with our own `bundle exec jekyll build` (not GitHub's built-in
# Pages-gem build), we are free to use any Jekyll version / plugins — see Gemfile.
#
# Site identity: served at the custom domain fairyfox.io (committed CNAME). The
# version-number scheme is unrelated to deployment — see
# notes/reference/versioning.md.
#
# Supply-chain hardening (hub/standards/supply-chain-hardening.md): top-level
# permissions are read-only; write scopes (pages/id-token) live only on the deploy
# job that needs them; every `uses:` is SHA-pinned with a version comment (Dependabot's
# github-actions ecosystem keeps the pins current — see .github/dependabot.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top; the deploy job elevates only what it needs.
permissions:
  contents: read

# Allow one concurrent deploy; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1

      - name: Set up Ruby
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b   # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true   # runs bundle install + caches gems

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b   # v5

      - name: Build with Jekyll
        # JEKYLL_ENV=production turns on jekyll-seo-tag canonical URLs, minified
        # output, etc. baseurl comes from the Pages config step.
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa   # v3
        # uploads ./_site by default

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write        # to deploy to Pages
      id-token: write      # to verify the deployment originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e   # v4
